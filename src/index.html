<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaraSara</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

  <div class="app-container">
    <!-- TOP TOOLBAR -->
    <header class="app-toolbar px-3 d-flex align-items-center justify-content-between">
      <!-- Left controls: App Name and File Rename -->
      <div class="toolbar-left d-flex align-items-center">
        <img src="icon.svg" class="app-icon-logo me-2" alt="SaraSara Logo" style="height: 24px; width: 24px; object-fit: contain;">
        <div class="document-title-wrapper d-flex align-items-center">
          <input type="text" id="documentTitleInput" class="form-control form-control-sm border-0 bg-transparent text-white fw-semibold" value="documento.md" title="Clique para renomear" placeholder="Sem título.md">
          <span class="material-symbols-outlined edit-icon text-muted ms-1 fs-6">edit</span>
        </div>
      </div>

      <!-- Center controls: Core Document Actions & Insert Blocks -->
      <div class="toolbar-center d-flex align-items-center gap-1">
        <!-- Document Operations -->
        <button id="btnNew" class="btn btn-toolbar" title="Novo Documento (Limpar)">
          <span class="material-symbols-outlined">note_add</span>
          <span>Novo</span>
        </button>
        <button id="btnOpen" class="btn btn-toolbar" title="Abrir Arquivo Markdown">
          <span class="material-symbols-outlined">folder_open</span>
          <span>Abrir</span>
        </button>
        <input type="file" id="fileImporter" accept=".md,.markdown,.txt" style="display: none;">
        
        <button id="btnSave" class="btn btn-toolbar btn-primary-accent" title="Salvar Alterações (Cmd+S)">
          <span class="material-symbols-outlined">save</span>
          <span>Salvar</span>
        </button>
        <button id="btnSaveAs" class="btn btn-toolbar" title="Salvar Como outro arquivo (Cmd+Shift+S)">
          <span class="material-symbols-outlined">save_as</span>
          <span>Salvar Como</span>
        </button>
        
        <div class="toolbar-divider mx-2"></div>
        
        <!-- Insert Blocks -->
        <button id="btnInsertTable" class="btn btn-toolbar" title="Inserir Tabela">
          <span class="material-symbols-outlined">table</span>
          <span>Tabela</span>
        </button>
        <button id="btnInsertCode" class="btn btn-toolbar" title="Inserir Bloco de Código">
          <span class="material-symbols-outlined">code_blocks</span>
          <span>Código</span>
        </button>
        <button id="btnInsertImage" class="btn btn-toolbar" title="Inserir Imagem">
          <span class="material-symbols-outlined">image</span>
          <span>Mídia</span>
        </button>
        <button id="btnInsertQuote" class="btn btn-toolbar" title="Inserir Citação">
          <span class="material-symbols-outlined">format_quote</span>
          <span>Citação</span>
        </button>
        <button id="btnInsertDivider" class="btn btn-toolbar" title="Inserir Linha Divisória">
          <span class="material-symbols-outlined">horizontal_rule</span>
          <span>Divisor</span>
        </button>
      </div>

      <!-- Right controls: View modes & Styling panel toggles -->
      <div class="toolbar-right d-flex align-items-center gap-2">
        <button id="btnUndo" class="btn btn-toolbar-icon" title="Desfazer">
          <span class="material-symbols-outlined">undo</span>
        </button>
        <button id="btnRedo" class="btn btn-toolbar-icon" title="Refazer">
          <span class="material-symbols-outlined">redo</span>
        </button>
        <div class="toolbar-divider mx-1"></div>
        <button id="btnToggleOutline" class="btn btn-toolbar-icon" title="Sumário do Documento">
          <span class="material-symbols-outlined">toc</span>
        </button>
        <button id="btnFocusMode" class="btn btn-toolbar-icon" title="Modo Foco (Distração Zero)">
          <span class="material-symbols-outlined">fullscreen</span>
        </button>
        <button id="btnThemeToggle" class="btn btn-toolbar-icon" title="Alternar Modo Claro/Escuro">
          <span class="material-symbols-outlined" id="themeIcon">light_mode</span>
        </button>
        <button id="btnToggleSidebar" class="btn btn-toolbar-icon active" title="Exibir/Ocultar Formatação">
          <span class="material-symbols-outlined">dock_to_right</span>
        </button>
      </div>
    </header>

    <!-- MAIN APP WORKSPACE -->
    <div class="app-workspace">
      
      <!-- LEFT SIDEBAR: OUTLINE / TABLE OF CONTENTS -->
      <aside class="sidebar-outline collapsed" id="sidebarOutline">
        <div class="sidebar-header d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
          <span class="fw-semibold text-uppercase tracking-wider">Sumário</span>
          <button class="btn btn-close-sidebar text-muted" id="btnCloseOutline">
            <span class="material-symbols-outlined fs-5">close</span>
          </button>
        </div>
        <div class="sidebar-body px-3 py-3" id="outlineContainer">
          <p class="text-muted small">Crie cabeçalhos (H1, H2, H3) para visualizar a estrutura do documento aqui.</p>
        </div>
      </aside>

      <!-- CENTER WRITING AREA (TABS + CANVAS) -->
      <div class="workspace-center">
        <!-- TABS BAR -->
        <div class="app-tab-bar" id="appTabBar">
          <div class="tabs-scroll-area" id="tabsScrollArea">
            <!-- Tabs will be dynamically created here -->
          </div>
          <button id="btnNewTab" class="btn btn-tab-add" title="Nova Aba (Cmd+T)">
            <span class="material-symbols-outlined fs-5">add</span>
          </button>
        </div>

        <main class="editor-canvas-container" id="editorCanvasContainer">
          <!-- Floating Focus-mode Close Button -->
          <button id="btnExitFocus" class="btn btn-exit-focus d-none" title="Sair do Modo Foco">
            <span class="material-symbols-outlined me-1">fullscreen_exit</span>
            <span>Sair do Foco</span>
          </button>

          <!-- Toast Notification -->
          <div class="app-toast shadow" id="appToast">Salvo com sucesso!</div>

          <div class="document-page-wrapper">
            <!-- Seamless Writing Sheet -->
            <div class="document-sheet" id="editorjs"></div>
          </div>
        </main>
      </div>

      <!-- RIGHT SIDEBAR: PAGES-STYLE FORMAT PANEL -->
      <aside class="sidebar-format" id="sidebarFormat">
        <div class="sidebar-header px-3 py-3 border-bottom d-flex align-items-center justify-content-between">
          <span class="sidebar-title">Formatar</span>
          <span class="badge bg-secondary-dark text-muted-accent px-2 py-1 fs-7">Texto</span>
        </div>
        
        <div class="sidebar-body p-3">
          
          <!-- TEXT STYLE SECTION -->
          <div class="format-section mb-4">
            <label class="section-label mb-2">Estilo de Parágrafo</label>
            <div class="dropdown">
              <button class="btn btn-format-select w-100 d-flex justify-content-between align-items-center" type="button" id="paragraphStyleDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <span id="currentStyleLabel">Corpo (Parágrafo)</span>
                <span class="material-symbols-outlined fs-6">expand_more</span>
              </button>
              <ul class="dropdown-menu w-100" aria-labelledby="paragraphStyleDropdown">
                <li><a class="dropdown-item py-2" href="#" data-style="paragraph">Corpo (Parágrafo)</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item py-2 fw-bold fs-5" href="#" data-style="h1">Título 1</a></li>
                <li><a class="dropdown-item py-2 fw-semibold fs-6" href="#" data-style="h2">Título 2</a></li>
                <li><a class="dropdown-item py-2 fs-6 text-muted-accent" href="#" data-style="h3">Título 3</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item py-2 fst-italic" href="#" data-style="quote">Citação</a></li>
              </ul>
            </div>
          </div>

          <!-- CHARACTER STYLES -->
          <div class="format-section mb-4">
            <label class="section-label mb-2">Estilo do Caractere</label>
            <div class="btn-group-row d-flex gap-1 mb-2">
              <button id="btnFormatBold" class="btn btn-format-control flex-fill" title="Negrito">
                <span class="material-symbols-outlined">format_bold</span>
              </button>
              <button id="btnFormatItalic" class="btn btn-format-control flex-fill" title="Itálico">
                <span class="material-symbols-outlined">format_italic</span>
              </button>
              <button id="btnFormatStrike" class="btn btn-format-control flex-fill" title="Tachado">
                <span class="material-symbols-outlined">strikethrough_s</span>
              </button>
              <button id="btnFormatInlineCode" class="btn btn-format-control flex-fill" title="Código em Linha">
                <span class="material-symbols-outlined">code</span>
              </button>
            </div>
            
            <div class="btn-group-row d-flex gap-1">
              <button id="btnFormatLink" class="btn btn-format-control w-100 d-flex align-items-center justify-content-center gap-1" title="Adicionar Link">
                <span class="material-symbols-outlined fs-5">link</span>
                <span class="fs-7">Inserir Link</span>
              </button>
            </div>
          </div>

          <!-- ALIGNMENT -->
          <div class="format-section mb-4">
            <label class="section-label mb-2">Alinhamento</label>
            <div class="btn-group w-100" role="group">
              <button id="btnAlignLeft" class="btn btn-format-control active" title="Esquerda">
                <span class="material-symbols-outlined">format_align_left</span>
              </button>
              <button id="btnAlignCenter" class="btn btn-format-control" title="Centralizado">
                <span class="material-symbols-outlined">format_align_center</span>
              </button>
              <button id="btnAlignRight" class="btn btn-format-control" title="Direita">
                <span class="material-symbols-outlined">format_align_right</span>
              </button>
              <button id="btnAlignJustify" class="btn btn-format-control" title="Justificado">
                <span class="material-symbols-outlined">format_align_justify</span>
              </button>
            </div>
          </div>

          <!-- LISTS -->
          <div class="format-section mb-4">
            <label class="section-label mb-2">Marcadores e Listas</label>
            <div class="btn-group w-100" role="group">
              <button id="btnListNone" class="btn btn-format-control active" title="Sem Lista">
                <span class="fs-7">Nenhum</span>
              </button>
              <button id="btnListBullet" class="btn btn-format-control" title="Lista com Marcadores">
                <span class="material-symbols-outlined">format_list_bulleted</span>
              </button>
              <button id="btnListOrdered" class="btn btn-format-control" title="Lista Numerada">
                <span class="material-symbols-outlined">format_list_numbered</span>
              </button>
            </div>
          </div>

          <!-- CONTEXTUAL ELEMENT EDITORS -->
          <div id="contextualEditor" class="border-top pt-3 mt-3 d-none">
            <!-- Dynamic context-specific options go here (rendered on focus) -->
            <label class="section-label mb-2 text-warning" id="contextTitle">Opções de Mídia</label>
            
            <!-- Code block options -->
            <div id="contextCodeOptions" class="d-none">
              <div class="mb-3">
                <label class="fs-7 text-muted-accent d-block mb-1">Linguagem</label>
                <select class="form-select form-select-sm sidebar-select" id="codeLangSelect">
                  <option value="plaintext">Texto Plano</option>
                  <option value="javascript">JavaScript</option>
                  <option value="typescript">TypeScript</option>
                  <option value="html">HTML</option>
                  <option value="css">CSS</option>
                  <option value="python">Python</option>
                  <option value="cpp">C++</option>
                  <option value="csharp">C#</option>
                  <option value="java">Java</option>
                  <option value="php">PHP</option>
                  <option value="ruby">Ruby</option>
                  <option value="go">Go</option>
                  <option value="rust">Rust</option>
                  <option value="lua">Lua</option>
                  <option value="bash">Bash/Shell</option>
                  <option value="markdown">Markdown</option>
                  <option value="json">JSON</option>
                  <option value="yaml">YAML</option>
                  <option value="xml">XML</option>
                  <option value="sql">SQL</option>
                </select>
              </div>
            </div>

            <!-- Image options -->
            <div id="contextImageOptions" class="d-none">
              <div class="mb-3">
                <label class="fs-7 text-muted-accent d-block mb-1">Caminho da Imagem (URL ou Base64)</label>
                <div class="input-group input-group-sm">
                  <input type="text" class="form-control sidebar-input" id="imageSrcInput" placeholder="https://exemplo.com/imagem.png">
                  <button class="btn btn-outline-secondary btn-sm" id="btnUploadImageLocal" title="Fazer upload de imagem do computador">
                    <span class="material-symbols-outlined fs-5">upload</span>
                  </button>
                </div>
                <input type="file" id="localImageFileInput" accept="image/*" style="display: none;">
              </div>
              <div class="mb-3">
                <label class="fs-7 text-muted-accent d-block mb-1">Legenda (Caption)</label>
                <input type="text" class="form-control form-control-sm sidebar-input" id="imageCaptionInput" placeholder="Ex: Legenda explicativa">
              </div>
              <div class="mb-3">
                <label class="fs-7 text-muted-accent d-block mb-1">Texto Alternativo (Alt)</label>
                <input type="text" class="form-control form-control-sm sidebar-input" id="imageAltInput" placeholder="Ex: Descrição da imagem para acessibilidade">
              </div>
            </div>

            <!-- Table options -->
            <div id="contextTableOptions" class="d-none">
              <div class="d-flex flex-wrap gap-1">
                <button id="btnTableAddRow" class="btn btn-outline-secondary btn-sm flex-fill d-flex align-items-center justify-content-center gap-1">
                  <span class="material-symbols-outlined fs-5">playlist_add</span>
                  <span>Linha</span>
                </button>
                <button id="btnTableAddCol" class="btn btn-outline-secondary btn-sm flex-fill d-flex align-items-center justify-content-center gap-1">
                  <span class="material-symbols-outlined fs-5">view_column</span>
                  <span>Coluna</span>
                </button>
                <button id="btnTableDelRow" class="btn btn-outline-danger btn-sm flex-fill d-flex align-items-center justify-content-center gap-1">
                  <span class="material-symbols-outlined fs-5">delete</span>
                  <span>Remover L</span>
                </button>
                <button id="btnTableDelCol" class="btn btn-outline-danger btn-sm flex-fill d-flex align-items-center justify-content-center gap-1">
                  <span class="material-symbols-outlined fs-5">delete</span>
                  <span>Remover C</span>
                </button>
              </div>
            </div>
          </div>

          <!-- DOCUMENT STATS -->
          <div class="stats-section border-top pt-3 mt-4">
            <label class="section-label mb-2">Estatísticas</label>
            <div class="d-flex justify-content-between mb-1">
              <span class="text-muted-accent small">Palavras:</span>
              <span class="fw-semibold text-white small" id="statWords">0</span>
            </div>
            <div class="d-flex justify-content-between mb-1">
              <span class="text-muted-accent small">Caracteres:</span>
              <span class="fw-semibold text-white small" id="statChars">0</span>
            </div>
            <div class="d-flex justify-content-between">
              <span class="text-muted-accent small">Tempo de Leitura:</span>
              <span class="fw-semibold text-white small" id="statReadTime">&lt; 1 min</span>
            </div>
          </div>

        </div>
      </aside>

    </div>
  </div>

  <!-- EDITOR.JS CORE & PLUGINS VIA CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2.28.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2.8.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@1.9.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@2.9.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@2.6.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@2.3.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/inline-code@1.5.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1.4.2"></script>

  <!-- BOOTSTRAP BUNDLE JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- APPLICATION SCRIPTS -->
  <script src="app.js"></script>
</body>
</html>
